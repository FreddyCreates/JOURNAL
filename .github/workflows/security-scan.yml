name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Secret scanning
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
    
    - name: Check for hardcoded secrets in Python
      run: |
        python -m pip install bandit
        bandit -r src/python -f json -o /tmp/bandit.json || true
      continue-on-error: true

  dependencies:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check Python dependencies
      run: |
        pip install pip-audit
        pip install -e "src/python[dev]"
        pip-audit --desc || true
      continue-on-error: true
    
    - name: Run Dependabot checks
      uses: github/dependabot-action@v2
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -e "src/python[dev]"
    
    - name: Run security linters
      run: |
        pip install pylint safety
        safety check --json || true
        pylint src/python --exit-zero || true
      continue-on-error: true

name: Deploy Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -e "src/python[dev]"
    
    - name: Run all tests
      run: bash scripts/test-all.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build release
      run: bash scripts/build-release.sh

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        bash scripts/deploy-staging.sh
    
    - name: Verify deployment
      run: |
        bash scripts/deploy-verify.sh
      env:
        API_URL: https://staging.example.com
      continue-on-error: true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Sovereign Intelligence</title>
  <style>
    /* ═══════════════════════════════════════════════════════════
     *  JARVIS Side Panel — Dark Sovereign Theme
     * ═══════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0d1117;
      color: #e0e0e0;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a1a40 0%, #0d1117 50%, #1a1a40 100%);
      border-bottom: 1px solid #6c63ff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title .logo {
      font-size: 20px;
    }

    .header-title .name {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(90deg, #6c63ff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .header-btn {
      background: rgba(108, 99, 255, 0.15);
      border: 1px solid rgba(108, 99, 255, 0.3);
      color: #8b85ff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover {
      background: rgba(108, 99, 255, 0.3);
      color: #fff;
    }

    /* ── Tab Bar ──────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .tab-btn.active {
      color: #6c63ff;
      border-bottom-color: #6c63ff;
      background: rgba(108, 99, 255, 0.08);
    }

    .tab-btn:hover { color: #c9d1d9; }

    .tab-icon { font-size: 14px; }

    /* ── Panel Views ─────────────────────────────────────────── */
    .panel-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .panel-view.active {
      display: flex;
    }

    /* ── Chat View ─────────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 10px 12px;
      border-radius: 8px;
      max-width: 95%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 12.5px;
      line-height: 1.5;
    }

    .message.user {
      background: #1f2937;
      border: 1px solid #374151;
      align-self: flex-end;
      color: #e5e7eb;
    }

    .message.jarvis {
      background: linear-gradient(135deg, #1a1a40, #1e1e4a);
      border: 1px solid #6c63ff33;
      align-self: flex-start;
      color: #d4d4ff;
    }

    .message.system {
      background: #0d2818;
      border: 1px solid #1a5c2e;
      align-self: center;
      color: #4ade80;
      font-size: 11px;
      text-align: center;
    }

    .message .type-badge {
      display: inline-block;
      background: #6c63ff33;
      color: #8b85ff;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Chat Input ───────────────────────────────────────── */
    .chat-input-area {
      border-top: 1px solid #30363d;
      padding: 10px 12px;
      background: #161b22;
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 120px;
    }

    .chat-input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 2px rgba(108, 99, 255, 0.2);
    }

    .send-btn {
      background: linear-gradient(135deg, #6c63ff, #5a52d5);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover { background: linear-gradient(135deg, #7c73ff, #6c63ff); }

    .quick-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .quick-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      background: #30363d;
      color: #e0e0e0;
      border-color: #6c63ff;
    }

    /* ── Tabs View ────────────────────────────────────────── */
    .tabs-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .browser-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .browser-tab:hover {
      border-color: #6c63ff;
      background: #1a1a40;
    }

    .browser-tab.active-tab {
      border-color: #6c63ff;
      background: rgba(108, 99, 255, 0.1);
    }

    .browser-tab .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .browser-tab .tab-close {
      color: #f85149;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    .browser-tab .tab-close:hover { opacity: 1; }

    .tab-actions-bar {
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .tab-action-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .tab-action-btn:hover {
      background: #30363d;
      color: #e0e0e0;
    }

    /* ── Notes View ───────────────────────────────────────── */
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .note-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .note-card .note-text {
      font-size: 12px;
      margin-bottom: 4px;
    }

    .note-card .note-meta {
      font-size: 10px;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }

    .note-card .note-delete {
      color: #f85149;
      cursor: pointer;
      font-size: 10px;
    }

    .note-input-area {
      border-top: 1px solid #30363d;
      padding: 10px 12px;
      background: #161b22;
      flex-shrink: 0;
    }

    /* ── Engines View ────────────────────────────────────── */
    .engines-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .engine-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .engine-card .engine-id {
      font-size: 9px;
      color: #6c63ff;
      font-weight: 600;
      min-width: 52px;
    }

    .engine-card .engine-name {
      flex: 1;
      font-size: 11px;
    }

    .engine-card .engine-ring {
      font-size: 9px;
      color: #8b949e;
      background: #21262d;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #6c63ff;
      margin: 12px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-title:first-child { margin-top: 0; }

    /* ── Screenshot preview ──────────────────────────────── */
    .screenshot-preview {
      max-width: 100%;
      border-radius: 6px;
      border: 1px solid #30363d;
      margin-top: 6px;
    }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6c63ff; }
  </style>
</head>
<body>

  <!-- ═══ Header ═══ -->
  <div class="header">
    <div class="header-title">
      <span class="logo">🤖</span>
      <span class="name">JARVIS</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-status" title="System Status">⚡</button>
      <button class="header-btn" id="btn-help" title="Help">❓</button>
    </div>
  </div>

  <!-- ═══ Tab Bar ═══ -->
  <div class="tab-bar">
    <button class="tab-btn active" data-view="chat">
      <span class="tab-icon">💬</span>
      <span>Chat</span>
    </button>
    <button class="tab-btn" data-view="tabs">
      <span class="tab-icon">📑</span>
      <span>Tabs</span>
    </button>
    <button class="tab-btn" data-view="notes">
      <span class="tab-icon">📝</span>
      <span>Notes</span>
    </button>
    <button class="tab-btn" data-view="engines">
      <span class="tab-icon">⚙️</span>
      <span>Engines</span>
    </button>
  </div>

  <!-- ═══ Chat View ═══ -->
  <div class="panel-view active" id="view-chat">
    <div class="chat-messages" id="chat-messages">
      <div class="message system">
        🤖 JARVIS Online — Sovereign Intelligence Active<br>
        20 Engines · 16 SDKs · 16 Protocols<br>
        Type "help" for commands
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Ask JARVIS anything..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">▶</button>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" data-cmd="help">❓ Help</button>
        <button class="quick-btn" data-cmd="list tabs">📑 Tabs</button>
        <button class="quick-btn" data-cmd="show notes">📝 Notes</button>
        <button class="quick-btn" data-cmd="status">⚡ Status</button>
        <button class="quick-btn" data-cmd="read page">📖 Read Page</button>
        <button class="quick-btn" data-cmd="screenshot">📸 Capture</button>
      </div>
    </div>
  </div>

  <!-- ═══ Tabs View ═══ -->
  <div class="panel-view" id="view-tabs">
    <div class="tab-actions-bar">
      <button class="tab-action-btn" id="btn-new-tab">＋ New Tab</button>
      <button class="tab-action-btn" id="btn-refresh-tabs">🔄 Refresh</button>
    </div>
    <div class="tabs-list" id="tabs-list">
      <!-- populated dynamically -->
    </div>
  </div>

  <!-- ═══ Notes View ═══ -->
  <div class="panel-view" id="view-notes">
    <div class="notes-list" id="notes-list">
      <!-- populated dynamically -->
    </div>
    <div class="note-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="note-input" placeholder="Write a note..." rows="1"></textarea>
        <button class="send-btn" id="save-note-btn">💾</button>
      </div>
    </div>
  </div>

  <!-- ═══ Engines View ═══ -->
  <div class="panel-view" id="view-engines">
    <div class="engines-list" id="engines-list">
      <!-- populated dynamically -->
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
